apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: budget-django
  namespace: argocd
spec:
  project: default
  source:
    path: k8s/budget-django
    repoURL: 'https://github.com/timohermans/cluster.git'
    targetRevision: HEAD
  destination:
    namespace: budget-django
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true