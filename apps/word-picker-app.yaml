apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: word-picker
  namespace: argocd
spec:
  project: default
  source:
    path: k8s/word-picker
    repoURL: 'https://github.com/timohermans/cluster.git'
    targetRevision: HEAD
  destination:
    namespace: word-picker
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true