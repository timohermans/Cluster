apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
spec:
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.0.1
        command: ["/opt/keycloak/bin/kc.sh", "start"]
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "4Gi"
        env:
          - name: JAVA_OPTS
            value: "-Xms1g -Xmx2g -XX:+UseG1GC -XX:+UseStringDeduplication -Djava.net.preferIPv4Stack=true"
        envFrom:
          - configMapRef:
              name: keycloak-config
          - secretRef:
              name: keycloak-vault
        ports:
        - containerPort: 8080