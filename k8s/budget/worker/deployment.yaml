apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-worker
  namespace: budget
spec:
  selector:
    matchLabels:
      app: backend-worker
  template:
    metadata:
      labels:
        app: backend-worker
    spec:
      volumes:
        - name: appsettings
          secret:
            secretName: worker
      containers:
        - name: backend-worker-container
          image: registry.timo-hermans.nl/budget-worker:2026.1.31.8
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: appsettings
              mountPath: /app/appsettings.Production.json
              subPath: appsettings.Production.json
      imagePullSecrets:
        - name: regcred
