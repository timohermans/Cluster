apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-budget
  namespace: budget
spec:
  selector:
    matchLabels:
      app: db-budget
  serviceName: db-budget
  replicas: 1
  template:
    metadata:
      labels:
        app: db-budget
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: db-secrets
            - configMapRef:
                name: db-config-map
          volumeMounts:
            - name: db-pvc
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: db-pvc
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
