apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      volumes:
        - name: settings
          secret:
            secretName: web-secrets
      containers:
        - name: web
          image: registry.timo-hermans.nl/budget-django:alpha
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - containerPort: 8000
          volumeMounts:
            - mountPath: /app/.env
              subPath: .env
              name: settings
              readOnly: true
      imagePullSecrets:
        - name: regcred
